name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Zip dist
        run: zip -r dist.zip dist/

      - name: Create Amplify deployment
        id: create_deploy
        run: |
          RESULT=$(aws amplify create-deployment \
            --app-id ${{ vars.AMPLIFY_APP_ID }} \
            --branch-name main \
            --region ap-southeast-1 \
            --output json)
          echo "job_id=$(echo $RESULT | jq -r '.jobId')" >> $GITHUB_OUTPUT
          echo "upload_url=$(echo $RESULT | jq -r '.zipUploadUrl')" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1

      - name: Upload artifact
        run: curl -T dist.zip "${{ steps.create_deploy.outputs.upload_url }}"

      - name: Start deployment
        run: |
          aws amplify start-deployment \
            --app-id ${{ vars.AMPLIFY_APP_ID }} \
            --branch-name main \
            --job-id ${{ steps.create_deploy.outputs.job_id }} \
            --region ap-southeast-1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
